name: ingest

# Larder ingestion runs OFF Firebase (Spark Functions cannot make outbound
# network calls). GitHub-hosted runners have full internet, so the pipeline
# runs here and writes to Firestore via the Admin SDK (service-account auth,
# not a Cloud Function — the Spark outbound block never applies).

on:
  schedule:
    # Every 6 hours, offset off the hour to dodge GitHub's peak-time delays.
    - cron: '17 */6 * * *'
  workflow_dispatch:
    inputs:
      limit:
        description: 'Optional per-run recipe-write cap (blank = default ~4200; small value = smoke test)'
        required: false
        default: ''
  push:
    branches: [main]
    paths:
      - 'ingestion/**'
      - '.github/workflows/ingest.yml'

concurrency:
  group: ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install ingestion deps
        working-directory: ingestion
        run: npm install

      - name: Run ingestion
        working-directory: ingestion
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          THEMEALDB_KEY: ${{ secrets.THEMEALDB_KEY }}
          EDAMAM_ID: ${{ secrets.EDAMAM_ID }}
          EDAMAM_KEY: ${{ secrets.EDAMAM_KEY }}
          EDAMAM_TIER: ${{ secrets.EDAMAM_TIER }}
          LIMIT: ${{ github.event.inputs.limit }}
        # --source mega = the 10K driver: seed-once TheMealDB corpus + ALL curated
        # sets (incl. every per-diet set), then the checkpointed diet×cuisine×mealType
        # Edamam backfill that fills toward 10K across runs, under the free Spark
        # 20K-writes/day cap. All layers are idempotent via contentHash diffing, so
        # re-runs are near-zero-write. The Edamam matrix skips CLEANLY when
        # EDAMAM_ID/EDAMAM_KEY are unset — until those secrets exist, mega behaves
        # exactly like a full single-pass (TheMealDB + curated only, ceiling ~3-4k);
        # the moment the keys land, the same cron starts harvesting to 10K with no
        # code change. --limit caps the per-run write budget for a smoke test.
        run: |
          if [ -n "$LIMIT" ]; then
            node ingest.js --source mega --limit "$LIMIT"
          else
            node ingest.js --source mega
          fi
