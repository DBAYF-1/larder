name: ingest

# Larder ingestion runs OFF Firebase (Spark Functions cannot make outbound
# network calls). GitHub-hosted runners have full internet, so the pipeline
# runs here and writes to Firestore via the Admin SDK (service-account auth,
# not a Cloud Function — the Spark outbound block never applies).

on:
  schedule:
    # Every 6 hours, offset off the hour to dodge GitHub's peak-time delays.
    - cron: '17 */6 * * *'
  workflow_dispatch:
    inputs:
      limit:
        description: 'Optional per-run recipe-write cap (blank = default ~4200; small value = smoke test)'
        required: false
        default: ''
  push:
    branches: [main]
    paths:
      - 'ingestion/**'
      - '.github/workflows/ingest.yml'

concurrency:
  group: ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install ingestion deps
        working-directory: ingestion
        run: npm install

      - name: Run ingestion
        working-directory: ingestion
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          THEMEALDB_KEY: ${{ secrets.THEMEALDB_KEY }}
          EDAMAM_ID: ${{ secrets.EDAMAM_ID }}
          EDAMAM_KEY: ${{ secrets.EDAMAM_KEY }}
          EDAMAM_TIER: ${{ secrets.EDAMAM_TIER }}
          LIMIT: ${{ github.event.inputs.limit }}
        # --source all = full TheMealDB corpus + ALL curated sets (incl. every
        # per-diet set), with correct facets; the Edamam sampler skips cleanly
        # without keys. Idempotent via contentHash diffing. SWITCH TO --source
        # mega once EDAMAM_ID/EDAMAM_KEY secrets exist — mega adds the checkpointed
        # diet×cuisine×mealType Edamam backfill (the 10K driver, spread across runs
        # under the free 20K writes/day cap). --limit caps the run for a smoke test.
        run: |
          if [ -n "$LIMIT" ]; then
            node ingest.js --source all --limit "$LIMIT"
          else
            node ingest.js --source all
          fi
